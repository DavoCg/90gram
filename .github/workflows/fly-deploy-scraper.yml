# Deploy the getvinyls scraper service (Scrapyd) to Fly.io.
#
# Runs on pushes to develop that touch the scraper or its deploy config, and can also be triggered by
# hand (Actions tab -> Run workflow). The image is built remotely by Fly's builder (--remote-only), so
# no Docker is needed on the runner. This is an always-on worker (the Scrapyd daemon); it runs NO
# migrations (the API owns prisma migrate deploy) and only writes rows.
name: Deploy Scraper to Fly

on:
  push:
    branches: [develop]
    paths:
      - "apps/scraper/**"
      - ".github/workflows/fly-deploy-scraper.yml"
  workflow_dispatch:

# Never run two scraper deploys at once; cancel an in-progress deploy when a newer commit lands. A
# separate group from the API and jobs deploys so the apps deploy independently.
concurrency:
  group: fly-deploy-scraper
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -c apps/scraper/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
