# Fly.io config for the getvinyls API (apps/api). Deploy from the repo root:
#   fly deploy
# The build context is the repo root so the Dockerfile can see the whole pnpm workspace.

app = "getvinyls-api"
primary_region = "cdg"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  API_PORT = "8787"
  NODE_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
