# Scrapyd config for the getvinyls-scraper Fly app. Scrapyd reads ./scrapyd.conf from its working
# directory (/app in the image). Scrapyd is the daemon that runs the spiders; it has no scheduler of
# its own, so apps/jobs drives it (POSTs to schedule.json on each spider's cron).
[scrapyd]
# Bind on all interfaces so apps/jobs can reach it over Fly's private network
# (getvinyls-scraper.internal:6800). The app publishes NO public ports, so this is private only.
bind_address = 0.0.0.0
http_port    = 6800

# The project egg is baked into the image here at build time (see Dockerfile); runtime deps come from
# the venv, not the egg. dbs_dir/logs_dir are ephemeral scratch on the machine's local disk.
eggs_dir = /app/eggs
dbs_dir  = /app/dbs
logs_dir = /app/logs
# Empty: do NOT persist scraped items as feed files. Items are written straight to Postgres by the
# PostgresPipeline, so there is nothing to store on disk.
items_dir =

# Keep a bounded amount of finished-job history and per-job logs (ephemeral disk; observability only).
jobs_to_keep     = 20
finished_to_keep = 100

# Concurrency: max_proc = 0 means "scale with CPUs" (max_proc_per_cpu per core). The spiders run on
# staggered crons (one shop at a time), so this is just a safety cap, not the normal load.
max_proc         = 0
max_proc_per_cpu = 2
poll_interval    = 5.0
