name: Deploy to production

# Continuous deployment for the production channel, driven by the project fingerprint.
#
# On every push to `main` we compute the native fingerprint (the hash of everything that
# affects the native binary: native deps, app config, plugins). Then per platform:
#   - If a production build with that exact fingerprint already exists, the native layer is
#     unchanged, so we ship the JS/asset change as an over-the-air (OTA) update instead of
#     burning a build. Installed apps pick it up on next launch.
#   - If no matching build exists, the native layer changed and OTA is not enough, so we
#     start a fresh production build (which also captures the new fingerprint for next time).
#
# Channel <-> branch mapping lives in eas.json (`production` profile -> `production` channel).
on:
  push:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint

  # Android temporarily disabled -- re-enable by uncommenting all `*_android` jobs below.
  # get_android_build:
  #   name: Check for existing Android build
  #   needs: [fingerprint]
  #   type: get-build
  #   params:
  #     fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
  #     profile: production
  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production

  # Native fingerprint changed -> a new store build is required.
  # build_android:
  #   name: Build Android (production)
  #   needs: [get_android_build]
  #   if: ${{ !needs.get_android_build.outputs.build_id }}
  #   type: build
  #   params:
  #     platform: android
  #     profile: production
  build_ios:
    name: Build iOS (production)
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production

  # Native fingerprint unchanged -> ship the change over the air to the production channel.
  # publish_android_update:
  #   name: Publish Android OTA update
  #   needs: [get_android_build]
  #   if: ${{ needs.get_android_build.outputs.build_id }}
  #   type: update
  #   params:
  #     channel: production
  #     platform: android
  publish_ios_update:
    name: Publish iOS OTA update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    params:
      channel: production
      platform: ios

  # New build was produced -> submit it to the store. These only run on the build path: when we
  # OTA instead, the build jobs are skipped, so their dependent submit jobs are skipped too.
  # Requires store credentials in eas.json `submit.production` (see that file).
  # submit_android:
  #   name: Submit Android to Play Store
  #   needs: [build_android]
  #   type: submit
  #   params:
  #     build_id: ${{ needs.build_android.outputs.build_id }}
  #     profile: production
  submit_ios:
    name: Submit iOS to App Store
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
