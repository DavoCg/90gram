name: Development build

# Fingerprint-driven dev clients for the `develop` branch.
#
# On every push to `develop` we compute the native fingerprint and, per platform, only start a
# new dev-client build when one with that fingerprint does not already exist (i.e. the native
# layer actually changed). When the native layer is unchanged we publish an OTA update to the
# `development` channel instead, so existing dev clients pick up the JS/asset change on relaunch.
#
# Manual one-off builds still work:
#   pnpm dlx eas-cli@latest workflow:run development-build.yml
on:
  push:
    branches: ['develop']
  workflow_dispatch:

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint

  get_android_build:
    name: Check for existing Android dev client
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: development
  get_ios_build:
    name: Check for existing iOS dev client
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: development

  # Native fingerprint changed -> build a fresh dev client (Android APK + iOS simulator).
  build_android:
    name: Build Android dev client (APK)
    needs: [get_android_build]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: development
  build_ios:
    name: Build iOS dev client (simulator)
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: development

  # Native fingerprint unchanged -> ship the change over the air to the development channel.
  publish_android_update:
    name: Publish Android OTA update
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    type: update
    params:
      channel: development
      platform: android
  publish_ios_update:
    name: Publish iOS OTA update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    params:
      channel: development
      platform: ios
