# Fly.io config for the getvinyls jobs service (apps/jobs). Deploy from the repo ROOT so the
# Dockerfile can see the whole pnpm workspace:
#   fly deploy -c apps/jobs/fly.toml
#
# This is an ALWAYS-ON worker: one machine stays up running the scheduler daemon, which fires jobs
# on their in-process crons (schedules live in env, e.g. TRACK_DURATIONS_CRON). It serves a private
# /health endpoint used only by the machine liveness check; nothing is published to the internet.
#
# The app must exist before the first deploy (flyctl deploy does NOT create it):
#   fly apps create getvinyls-jobs
#
# Set the database secret once (and tune schedules/timezone as needed):
#   fly secrets set -c apps/jobs/fly.toml DATABASE_URL=postgres://...
#   fly secrets set -c apps/jobs/fly.toml JOB_TIMEZONE=Europe/Paris TRACK_DURATIONS_CRON="0 3 * * *"
#
# Run a job once on demand (does not disturb the daemon):
#   fly machine run . -c apps/jobs/fly.toml --rm pnpm --filter @getvinyls/jobs start run track-durations

app = "getvinyls-jobs"
primary_region = "cdg"

[build]
  dockerfile = "apps/jobs/Dockerfile"

[env]
  NODE_ENV = "production"
  JOBS_PORT = "8080"

# Always-on worker: one machine runs the scheduler daemon continuously. There is no [[services]]
# block because the app serves no public traffic (a service with no ports is deprecated by Fly);
# liveness is a top-level machine check that hits the internal /health port. With no service the
# machine is never auto-stopped, so it stays up.
[checks]
  [checks.health]
    type = "http"
    port = 8080
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
